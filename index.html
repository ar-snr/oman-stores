    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, #1a2e40, #2c4a6f);
            color: white;
            text-align: center;
            padding: 50px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 25px;
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto;
        }

        #searchInput {
            width: 100%;
            padding: 15px 25px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            outline: none;
            transition: 0.3s;
        }

        #searchInput:focus {
            transform: scale(1.02);
        }

        .categories {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 20px;
            flex-wrap: wrap;
        }

        .category-btn {
            background-color: white;
            border: 1px solid #ddd;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .category-btn:hover, .category-btn.active {
            background-color: #d4af37;
            color: white;
            border-color: #d4af37;
        }

        .stores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .store-card {
            background-color: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .store-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* الأفاتار الرقمي الدائري الفخم والمستقر 100% */
        .store-avatar {
            width: 80px;
            height: 80px;
            background-color: #f1f3f5;
            color: #1a2e40;
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 2px solid #d4af37;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            user-select: none;
        }

        .store-card h3 {
            font-size: 1.25rem;
            margin-bottom: 10px;
            color: #1a2e40;
        }

        .store-card p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
            height: 70px;
            overflow: hidden;
        }

        .visit-btn {
            display: inline-block;
            background-color: #1a2e40;
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.3s;
            margin-top: auto;
        }

        .visit-btn:hover {
            background-color: #d4af37;
        }
		/* زر أضف متجرك الفخم */
.add-store-trigger {
    display: inline-block;
    background-color: #d4af37;
    color: #1a2e40;
    text-decoration: none;
    padding: 12px 30px;
    border-radius: 25px;
    font-weight: 700;
    font-size: 1rem;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: 0.3s;
    margin-bottom: 25px;
}

.add-store-trigger:hover {
    background-color: white;
    color: #1a2e40;
    transform: translateY(-2px);
}

/* واجهة النافذة المنبثقة (Popup Modal) */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s ease;
}

.modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
}

.modal-box {
    background-color: white;
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    position: relative;
    transform: translateY(-20px);
    transition: 0.3s ease;
}

.modal-overlay.active .modal-box {
    transform: translateY(0);
}

.modal-box h2 {
    color: #1a2e40;
    margin-bottom: 15px;
    font-size: 1.5rem;
    border-bottom: 2px solid #d4af37;
    padding-bottom: 10px;
}

.close-modal {
    position: absolute;
    top: 15px;
    left: 15px;
    background: none;
    border: none;
    font-size: 1.5rem;
    color: #999;
    cursor: pointer;
}

.close-modal:hover {
    color: #333;
}

.form-group {
    margin-bottom: 15px;
    text-align: right;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
    font-size: 0.9rem;
    color: #444;
}

.form-group input, .form-group textarea, .form-group select {
    width: 100%;
    padding: 10px 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 0.95rem;
    outline: none;
}

.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    border-color: #1a2e40;
    box-shadow: 0 0 5px rgba(26,46,64,0.2);
}

.submit-btn {
    width: 100%;
    background-color: #1a2e40;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
}

.submit-btn:hover {
    background-color: #d4af37;
}
    </style>
</head>
<body>

        <p>اكتشف أفضل المتاجر والمنصات العُمانية الموثوقة</p>
        <div class="search-container">

<div class="modal-overlay" id="modalOverlay">

            </div>
			<div class="form-group">

        <option value="food">أغذية ومأكولات</option>
        <option value="productive-families">دعم الأسر المنتجة (مشاريع منزلية)</option>
    </select>
</div>
            <div class="form-group">

            <button type="submit" class="submit-btn">إرسال الطلب للمراجعة</button>
        </form>

{

    name: "78sweet",
    category: "productive-families",

{

    name: "senora nails",
    category: "productive-families",
    description: "مشروع محلي متميز لتصميم اجمل اشكال الاظافر النسائيه.",

}

    const storesGrid = document.getElementById('storesGrid');
    const searchInput = document.getElementById('searchInput');
    const categoryButtons = document.querySelectorAll('.category-btn');

    function displayStores(storesToShow) {
        storesGrid.innerHTML = ""; 
        if(storesToShow.length === 0) {
            storesGrid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #666; padding: 20px;">عذراً، لم يتم العثور على متاجر تطابق بحثك.</p>`;
            return;
        }
        storesToShow.forEach(store => {
            // كود ذكي لاستخراج أول حرف من اسم المتجر تلقائياً وعرضه داخل الدائرة
            const firstLetter = store.name.charAt(0);
            
            const cardHTML = `
                <div class="store-card" data-category="${store.category}">
                    <div class="store-avatar">${firstLetter}</div>
                    <h3>${store.name}</h3>
                    <p>${store.description}</p>
                    <a href="${store.url}" target="_blank" class="visit-btn">زيارة المتجر</a>
                </div>
            `;
            storesGrid.insertAdjacentHTML('beforeend', cardHTML);
        });
    }

    displayStores(omaniStores);

    searchInput.addEventListener('input', (e) => {
        const searchTerm = e.target.value.toLowerCase();
        const filteredStores = omaniStores.filter(store => {
            return store.name.toLowerCase().includes(searchTerm) || 
                   store.description.toLowerCase().includes(searchTerm);
        });
        displayStores(filteredStores);
    });

    categoryButtons.forEach(button => {
        button.addEventListener('click', (e) => {
            categoryButtons.forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            const selectedCategory = button.getAttribute('data-category');
            if(selectedCategory === 'all') {
                displayStores(omaniStores);
            } else {
                const filtered = omaniStores.filter(store => store.category === selectedCategory);
                displayStores(filtered);
            }
        });
		// كود تشغيل وتأثيرات النافذة المنبثقة للـ Form
const modalOverlay = document.getElementById('modalOverlay');
const openModalBtn = document.getElementById('openModalBtn');
const closeModalBtn = document.getElementById('closeModalBtn');

openModalBtn.addEventListener('click', () => modalOverlay.classList.add('active'));
closeModalBtn.addEventListener('click', () => modalOverlay.classList.remove('active'));
modalOverlay.addEventListener('click', (e) => {
    if(e.target === modalOverlay) modalOverlay.classList.remove('active');
});
    });

</html>
